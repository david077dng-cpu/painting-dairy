            " id="js_content"><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">前段时间小编的研究生室友胡博士来北京玩，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">一起度过了一个超级快乐的周末～</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">必需得记录一下！</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">喝咖啡，聊聊天，等着胡同里的其他店铺开门：</span></span></section><section style="text-align: center;margin-left: 8px;margin-right: 8px;" nodeleaf=""><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100003989" data-ratio="0.6277777777777778" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjTlWk7stb31z5GZOILibdntfK01rrLLRqp7dHpp4Ih0MiazqCAgGxOx2qMWVibSJWtUcsrknTIib8bvicQ/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="1080" type="block" src="./assets/17742310379830.32319328280042026.jpg"></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">在帽子小店试的眼花缭乱，倾尽毕生绝学来帮我砍价：</span></span></section><section style="text-align: center;margin-left: 8px;margin-right: 8px;" nodeleaf=""><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100003990" data-ratio="0.7175925925925926" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjTlWk7stb31z5GZOILibdntfEw6Q33lKpSFiah8Jzade9m3Wh5XVZZ8zL3shDKkvONtibFuqgybE8v2g/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="1080" type="block" src="./assets/17742310378770.3595094558350196.jpg"></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">排队等待新出锅的热乎乎的门钉肉饼！</span></span></section><section style="text-align: center;margin-left: 8px;margin-right: 8px;" nodeleaf=""><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100003991" data-ratio="0.7703703703703704" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjTlWk7stb31z5GZOILibdntfS7V2KgyDJ8xMIKzKPrwXHwCC3p5cNsaz6uA2V680vibJh8jFGHqPyUA/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="1080" type="block" src="./assets/17742310378950.8095909201147462.jpg"></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">许久不见，老胡还是这么的古灵精怪～惹人爱～</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">看着她灿烂的笑容心情会达到满格</span><img data-src="https://res.wx.qq.com/t/wx_fed/we-emoji/res/assets/Expression/Expression_14@2x.png" class="rich_pages wxw-img" data-ratio="1" data-w="20" style="display:inline-block;width:20px;vertical-align:middle;background-size:cover;" src="./assets/17742310378650.3039185336063627.png"><span textstyle="" style="font-size: 15px;">！</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">就是小编画技捉急，画不出胡博士魅力的分毫呀！</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">和好朋友一起度过一整个周末太幸福啦！</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">好啦，今天先到这儿，欢迎留言、转发or给个"在看"呀～</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">下回见！</span></span></section><p style="display: none;"><mp-style-type data-value="3"></mp-style-type></p></div>
