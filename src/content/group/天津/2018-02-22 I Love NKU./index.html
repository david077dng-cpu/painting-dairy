                       " id="js_content"><blockquote><p style="margin-top: 10px;">渤海之滨，</p><p style="margin-top: 10px;">白河之津，</p><p style="margin-top: 10px;">巍巍我南开精神。<br></p></blockquote><p style="margin-top: 10px;">画天津怎能不画南开，</p><p style="margin-top: 10px;">画南开怎能不画天大。</p><p style="margin-top: 10px;">今天先从南开美丽的主楼画起。</p><p style="margin-top: 10px;">主楼正对学校南门，</p><p style="margin-top: 10px;">前面有我们敬爱的周总理像，</p><p style="margin-top: 10px;">所有的毕业生都会在总理像前面合影，</p><p style="margin-top: 10px;">然后再把学士帽高高的抛起，</p><p style="margin-top: 10px;">代表我们毕业了。</p><p style="margin-top: 10px;">一起抛学士帽时的场景还历历在目，</p><p style="margin-top: 10px;">转眼已经毕业快三年了。</p><p style="margin-top: 10px;"><br></p><p><img class="" data-copyright="0" data-ratio="0.72421875" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjR5XIU5FSibsWXuJddYehh7sEXcgyUezx6PHp6rAMa8AePRkRqhFpNRNToNeWvZsE36r80ANN1nIvg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327605130.05812188541227903.jpg"></p><p><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTcRDNuSrficiajicWibLWFMT1eiciarUOEb2CbvG9Zxf4tQXFSNoLAJhXFyT1kt0Il8TF4x4CapiaOgRKJQ/0?wx_fmt=jpeg" data-cropx1="0" data-cropx2="586" data-cropy1="394.8673835125448" data-cropy2="453.6774193548387" data-ratio="0.10068259385665529" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjR5XIU5FSibsWXuJddYehh7sls0bDQuY3AFV2icicEJP6aBUcUnWc5ks3AQKpMEib7ILpVUtCL1eOsJfA/640?wx_fmt=jpeg" data-type="jpeg" data-w="586" style="width: 558px;height: 56px;" src="./assets/17742327605660.0659429369165957.jpg"></p><p style="margin-top: 10px;">今天画的头晕眼花，</p><p style="margin-top: 10px;">画窗户居然让我回想起被答题卡支配的恐惧<img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/emoji_wx/2_05.png" data-ratio="1" data-w="20" style="display: inline-block;width: 20px;vertical-align: text-bottom;" src="./assets/17742327603020.9938200014102929.png">，</p><p style="margin-top: 10px;">明天画天大，</p><p style="margin-top: 10px;">敬请期待~</p><p style="text-align: center;margin-top: 10px;"><img class="" data-copyright="0" data-ratio="1" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_png/9FicrUzQHkjTiaLfGMgDLVadWLn5aolj39SibTpWPD7VVWRGW9icOjDwDUK71NzYZmVyGhoia4MTpics8BGiauXTUJvqg/640?wx_fmt=png" data-type="png" data-w="480" style="width: 167px;height: 167px;" src="./assets/17742327605650.4247169029870915.jpg"></p></div>
