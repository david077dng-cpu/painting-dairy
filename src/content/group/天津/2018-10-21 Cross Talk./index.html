                       " id="js_content"><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">这周回天津，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">和朋友一起去听了场相声。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><img class="" data-copyright="0" data-ratio="0.75" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQ4NuCWkJcQxPX7VH95PDmu0YmZGOhvgmgDTK26JxXhiaIbyico4XkcT1oUia2mpwBjlZvw9lRr2KX3A/640?wx_fmt=gif" data-type="gif" data-w="320" style="width: 139px;height: 104px;" src="./assets/17742327718600.7949836656532219.gif"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">坐在小方桌前面，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">嗑着瓜子喝着茶水，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">听台上两个人互损，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">有时还会“动手”</span><img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/emoji_ios/u1F602.png" data-ratio="1" data-w="20" style="display:inline-block;width:20px;vertical-align:text-bottom;" src="./assets/17742327717010.07421409110645294.png"><span style="font-size: 15px;">，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">超级有意思～<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">是一项十分解乏，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">超级受大家欢迎的休闲娱乐活动。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><img class="" data-copyright="0" data-ratio="0.69765625" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQ4NuCWkJcQxPX7VH95PDmuUg70M7TtUCjj825x9scYvVNHKdvJrvP7ocq3dUeNRCOO8J0oODv9Lw/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327719720.7668145867649522.jpg"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">天津有很多可以听相声的茶馆，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">强烈推荐来天津玩的小伙伴都来试试，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">绝对不虚此行</span><img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/smiley/smiley_44.png" data-ratio="1" data-w="20" style="display:inline-block;width:20px;vertical-align:text-bottom;" src="./assets/17742327719570.9605988449033133.png"><span style="font-size: 15px;">。。。</span></p><p style="text-align: center;margin-left: 8px;margin-right: 8px;margin-top: 10px;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTcRDNuSrficiajicWibLWFMT1eFhgo9PCX3tANYibDxfFNIwnsQMnO3BwFxUiaGm1TTSmQicl46oODd94vQ/0?wx_fmt=jpeg" data-cropx1="0" data-cropx2="694" data-cropy1="402.266318537859" data-cropy2="496.49086161879893" data-ratio="0.13544668587896252" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQQnPpJQLqTFDO5nmTGDYKs1ChdMFannZROYPHRmZWzdWaROKrwia9He7pZhFrbTKXBBsC3Yhnibmhw/640?wx_fmt=jpeg" data-type="jpeg" data-w="694" style="width: 290px;height: 39px;" src="./assets/17742327717040.6565944447794948.jpg"></p><p style="text-align: center;margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">欢迎点赞、留言and转发发发~</span></p><p style="text-align: center;margin-left: 8px;margin-right: 8px;margin-top: 10px;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTiaLfGMgDLVadWLn5aolj39edVfRO6BicH3nkFSVoia0USh5ZqI6GvqX1GzBsMbXFpwQKpe1FxXsaAg/0?wx_fmt=jpeg" data-cropx1="151.25065274151436" data-cropx2="1021.6553524804178" data-cropy1="79.90600522193212" data-cropy2="910.3577023498696" data-ratio="0.9540229885057471" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQQnPpJQLqTFDO5nmTGDYKsibk4nhuIshhjr7icPKzhoUJjQicY9ia9ALKMPoHwJbogJ7GkFrtGPGNw0Q/640?wx_fmt=jpeg" data-type="jpeg" data-w="870" style="width: 206px;height: 197px;" src="./assets/17742327717540.10098424086775248.jpg"></p><p style="text-align: center;"><br></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><img class="" data-copyright="0" data-ratio="0.12083333333333333" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQ1U6fBpWKudpYHTw2VQ8Fh3wibSCLBicicfibxZjSgcjJWoKEXLTozNpiaOuRm15MU0KrI9oHYiaEiaVlKw/640?wx_fmt=gif" data-type="gif" data-w="720" style="" src="./assets/17742327717080.5164262349098588.gif"></p></div>
