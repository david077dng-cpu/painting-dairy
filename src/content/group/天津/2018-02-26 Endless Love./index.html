                       " id="js_content"><p style="margin-top: 10px;">今天去了天津滨海新区，</p><p style="margin-top: 10px;">见识一下前一阵很火的图书馆。</p><p style="margin-top: 10px;">进门之前就透过落地窗偷瞄到了这个场景，</p><p style="margin-top: 10px;">震撼啊，</p><p style="margin-top: 10px;">铺天盖地的书，</p><p style="margin-top: 10px;">汗牛充栋。</p><p style="margin-top: 10px;">站在层层书架间，</p><p style="margin-top: 10px;">顿觉“吾生也有涯，而知也无涯”。</p><p style="margin-top: 10px;"><br></p><p><img class="" data-copyright="0" data-ratio="0.70625" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQJtISZkc70STLicamKY3ibcJibo1j2IuFSIVfalpyuPjbTiaxmOPVSREdN1Dr2Ppwg8M9rZjLofU2Lhg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327733750.9975242352017525.jpg"></p><p><br></p><p style="margin-top: 10px;">但是进去近看之后，</p><p style="margin-top: 10px;">发现这些书居然是壁纸。</p><p style="margin-top: 10px;"><img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/emoji_wx/2_05.png" data-ratio="1" data-w="20" style="display: inline-block;width: 20px;vertical-align: text-bottom;" src="./assets/17742327731380.16921846329238122.png">让我说什么好<img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/smiley/smiley_33.png" data-ratio="1" data-w="20" style="display: inline-block;width: 20px;vertical-align: text-bottom;" src="./assets/17742327737710.49175563926344557.png">。</p><p><br></p><p style="text-align: center;"><img data-copyright="0" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQicTsKAy7lRggULzQ6DxR9UqQTMiay3wVnk8sGJIEMF5lcjNzWeuRRNWhE7d7hUdQfmHmKhqPzIC7Q/640?wx_fmt=gif" data-type="gif" style="width: 484px;height: 38px;" class="" data-ratio="0.0796875" data-w="640" src="./assets/17742327732810.9388222134668093.gif"></p><p><br></p><p style="margin-top: 10px;">另外，今天我和徒弟一起去看柯南巡回展了，</p><p style="margin-top: 10px;">回忆满满~</p><p><br></p><p style="text-align: center;"><img class="" data-copyright="0" data-ratio="0.75" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQJtISZkc70STLicamKY3ibcJwZ9zNWUp8m1dusvjAfIcbeZiaHibobUnhUCxUicVkRZ3iaGo7JiaticQPy9w/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="width: 401px;height: 301px;" src="./assets/17742327733660.7836816776585032.jpg"></p><p>附上徒弟今天画的柯南~<br></p><p><img class="" data-copyright="0" data-ratio="1.29453125" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQJtISZkc70STLicamKY3ibcJEmTjENPfVZibHoebdwuynNcZicpic626u2rFKEtiaIOEIYWtXe8IZia9z4w/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327738580.765299241596272.jpg"></p><p style="margin-top: 10px;">是不是很有感觉~</p><p style="margin-top: 10px;">掌声鼓励鼓励。<br></p><p style="text-align: center;margin-top: 10px;"><img data-copyright="0" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQicTsKAy7lRggULzQ6DxR9UqQTMiay3wVnk8sGJIEMF5lcjNzWeuRRNWhE7d7hUdQfmHmKhqPzIC7Q/640?wx_fmt=gif" data-type="gif" style="width: 484px;height: 38px;" class="" data-ratio="0.0796875" data-w="640" src="./assets/17742327732470.3624867327772693.gif"></p><p style="margin-top: 10px;">好啦，今天先到这，</p><p style="margin-top: 10px;">欢迎评论、转发and转发~</p><p style="text-align: center;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTiaLfGMgDLVadWLn5aolj39edVfRO6BicH3nkFSVoia0USh5ZqI6GvqX1GzBsMbXFpwQKpe1FxXsaAg/0?wx_fmt=jpeg" data-cropx1="172.37275985663084" data-cropx2="995.0609318996417" data-cropy1="92.06272401433691" data-cropy2="904.9569892473116" data-ratio="0.9866342648845686" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQJtISZkc70STLicamKY3ibcJEjxN07SX6BibWaHcHJCZic7hgC8u6N3VjOdks4nicQNq6eoAWZ2iaMobyg/640?wx_fmt=jpeg" data-type="jpeg" data-w="823" style="width: 201px;height: 198px;" src="./assets/17742327738270.9108733439656088.jpg"></p><p><br></p></div>
