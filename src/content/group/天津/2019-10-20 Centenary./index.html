                       " id="js_content"><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">10月17日，母校南开迎来了百年华诞，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">小编在这里也为母校画一幅水彩，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">作为对百年校庆的小小献礼～</span></p><p style="text-align: center;margin-left: 8px;margin-right: 8px;margin-top: 10px;"><img class="rich_pages" data-ratio="0.7078125" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjRuSTtcrY36Z6bYIpNbiaHRgazfiaLMrGM6ibu6f8icPRxicxJzNAz4N3FnUDeM3eQptuNlYutQY2VIGKQ/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327562330.22423687903692535.jpg"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">每次从南门走进来的时候，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">看着稳重的主楼和前面的总理像，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">总会升起要好好学习的决心。</span><br></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">允公允能，日新月异，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">是对每一个南开人的要求。</span></p><section style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">渤</span><span style="font-size: 15px;">海之滨，</span><span style="color: rgb(0, 0, 0);font-size: 15px;">白河</span><span style="font-size: 15px;">之津，</span></section><section style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">巍巍南开精神永远灿烂。<br></span></section><section style="text-align: center;margin-top: 10px;"><br><img class="rich_pages" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjSGdxpMkXrePeddWUXxnicW4ic34IEojShN5vqj3lydH92rjtNpyTnoRrgLNEs519lx
