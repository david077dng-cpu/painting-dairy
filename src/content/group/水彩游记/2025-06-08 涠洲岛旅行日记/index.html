            " id="js_content"><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">今天的小画来自于五一的涠洲岛之行。</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><img data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjRWZgtn6ChtBR3fBREfvuFic1XI8EzukKUaC3x89aVnBDQ9obMx7ZPKWiaad5mHoQNJ0fx2MeO9ZXUw/640?wx_fmt=jpeg&amp;from=appmsg" class="rich_pages wxw-img js_insertlocalimg" data-ratio="0.49765625" data-s="300,640" data-type="jpeg" data-w="1280" type="block" data-imgfileid="100004096" src="./assets/17742289383540.9990998056914101.jpg"></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">好喜欢这条老街，有一种会在是枝裕和电影「海街日记」里出现的气质。</span></span></section><section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf="" data-pm-slice="1 1 [&quot;para&quot;,{&quot;tagName&quot;:&quot;section&quot;,&quot;attributes&quot;:{},&quot;namespaceURI&quot;:&quot;http://www.w3.org/1999/xhtml&quot;}]"><span textstyle="" style="font-size: 15px;">长长的护栏画出海岛的轮廓线，</span></span></section></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">一边是广阔的海水和沙滩，一边是林立的店铺与喧闹的街区，</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">骑着电摩穿梭在人群之间，海风时不时送来远处大海的味道，</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">夹杂着水汽的海风，令这条路上的行人减少了一些烈日炙烤的煎熬。</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">民宿的老板说晚上海浪会打到街上来，虽然没看到，但是光想想就令人</span></span><span leaf="" data-pm-slice="1 1 [&quot;para&quot;,{&quot;tagName&quot;:&quot;section&quot;,&quot;attributes&quot;:{&quot;style&quot;:&quot;margin-top: 8px;margin-left: 8px;margin-right: 8px;&quot;},&quot;namespaceURI&quot;:&quot;http://www.w3.org/1999/xhtml&quot;}]"><span textstyle="" style="font-size: 15px;">十分</span></span><span leaf=""><span textstyle="" style="font-size: 15px;">向往～</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">有机会再画一张夜景吧～</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">今天先到这，欢迎留言、转发or给个"❤️"～</span></span></section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">下回见！</span></span></section><p style="display: none;"><mp-style-type data-value="3"></mp-style-type></p></div>
