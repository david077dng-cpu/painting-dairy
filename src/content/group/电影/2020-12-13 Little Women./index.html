                       " id="js_content"><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">这周大大大降温呀，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">北京还下雪了。</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">在家看了个温情的电影暖和下～</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">就是《小妇人》啦～有没有猜对～</p><section style="text-align: center;margin-top: 10px;"><img class="rich_pages js_insertlocalimg" data-ratio="0.72890625" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQhjFma8szJmvk24uGScCTs9X9TictraU6ibxPn0fYbiaLExvdOkV5crkyC7fpib6sa3uLw6Ce11GINtg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742302234720.9504772392025889.jpg"></section><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">电影从一个圣诞夜开始，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">一家人挤在一起看爸爸的来信，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">身后的圣诞树闪闪，壁炉暖暖，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">很适合在12月观看。</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">我看的是1994年的版本，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">前一阵新上映了一版《小妇人》，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">没看到就下线了，</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">好在网上已经可以看到了，<br></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">就放到圣诞节的时候再看吧🌲🎅🏻～</p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;">大家晚安～下周见～</p></div>
