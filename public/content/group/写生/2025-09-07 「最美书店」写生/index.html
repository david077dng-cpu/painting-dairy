            " id="js_content"><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">这周机缘巧合在中关村附近的钟书阁坐了一下午，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">号称北京「最美书店」，确实有点不同。</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100004183" data-ratio="1.7777777777777777" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjTxcrmqUuHLbqUWcmAiaoT50RHfiaqcUfaYTytOOCx1sBia6Pxvn5yQnyuL4icRhrt5SrG1EM1oT7RnAw/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="1080" type="block" src="./assets/17742297693930.8506706557212361.jpg"></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">小小的入口里面别有洞天，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">只允许一人过的高耸阶梯，扶着扶手走在其中获得了爬山同款快乐，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">书架层层叠叠直到天花板，镜面让整个空间深邃又神秘，</span></span><span leaf=""><span textstyle="" style="font-size: 15px;">有种盗梦空间的感觉。</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">整个店空间不大，但是书又新又全，基本上都有样书，而且都好好滴包了书皮，体验感极好。</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">非常推荐～也欢迎留言互相推荐喜欢的书店呀！</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">好啦，今天先到这～欢迎评论、转发or点个「❤️」哟～</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">下回见！</span></span></section
