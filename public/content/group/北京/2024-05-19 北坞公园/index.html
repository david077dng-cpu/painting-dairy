            " id="js_content"><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><img class="rich_pages wxw-img" data-imgfileid="100003763" data-ratio="1.7796296296296297" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjSD6HISEz5Cdx019FMP2K8Qibsck8vgK7whHrTMSsj5MwFcBrcqGLbQxfPJGxm7K1Wn95ak4nibTAng/640?wx_fmt=jpeg" data-type="jpeg" data-w="1080" style="" src="./assets/17742309663160.5276306660837425.jpg"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">当景色变成层层叠叠的绿色时，夏天就真的来了。<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">这周画面绿植占比过多，收获几点心得：<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">颜色一定要多变，并且要留出透气的位置，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">笔触也一定要多变，湿画和干画相结合，<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">另外树干树枝可以多加<span style="font-size: 15px;letter-spacing: 0.578px;text-wrap: wrap;">一些</span>水，就会有种透光的效果，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">而且会平添一种夏天独有的湿漉漉的氛围感。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">虽然说夏天是画画非常痛苦的季节，<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">满眼都是绿油油的，非常单调枯燥，<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">但是也可以趁这机会多多练习，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">五彩斑斓的绿希望可以手到擒来！</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><img class="rich_pages wxw-img" data-imgfileid="100003762" data-ratio="1.6342592592592593" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjSD6HISEz5Cdx019FMP2K8QGuXafLxQFTJ9vjBBnqHq80iaJEErAt0dxPtY1AreT5AgJzAQmY9lUxA/640?wx_fmt=jpeg" data-type="jpeg" data-w="1080" style="" src="./assets/17742309663080.05358967946509796.jpg"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">好啦欢迎留言、转发or给个“在看”哟~<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 8px;"><span style="font-size: 15px;">下回见~</span></p><p style="display: none;"><mp-style-type data-value="3"></mp-style-type></p></div>
