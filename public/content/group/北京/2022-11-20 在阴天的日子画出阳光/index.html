            " id="js_content"><p><span style="font-size: 15px;">最近北京的蜜汁天气真是让人无奈，</span></p><p><span style="font-size: 15px;">工作日晴空万里的，一到周末就看不到太阳，</span></p><p><span style="font-size: 15px;">一个大雾预警连着一个雾霾预警的。</span></p><p><span style="font-size: 15px;">外加上疫情严重了起来，</span></p><p><span style="font-size: 15px;">周末只得在家看照片温习下阳光的感觉。</span></p><p><span style="font-size: 15px;">上周去动物园看到了火烈鸟。</span></p><p><span style="font-size: 15px;">本来以为冬天可能看不到了，</span></p><p><span style="font-size: 15px;">结果发现它们都聚在阳光照得到的</span><span style="font-size: 15px;">地方睡懒觉。</span></p><p style="text-align: center;"><img class="rich_pages wxw-img js_insertlocalimg" data-ratio="1.43125" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjRpfD25XCficdPo9hTWBF3JgtS1iaPreRnIXbpmNRvj4oxMicVlaoCe9LdERylnjw3YibCaiaVnaTrQZ0w/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742309644970.8967669797005164.jpg"></p><p><span style="font-size: 15px;">真想抱住一个一起晒太阳呀～</span></p><p><span style="font-size: 15px;">希望疫情在这个冬天赶快结束，等到春暖花开的时候就可以无忧无虑地出去玩啦！</span></p><p><span style="font-size: 15px;">加速视频在下面，欢迎留言、转发or给个"在看"呀～</span></p><p><span style="font-size: 15px;">下回见～</span></p><section><div style="height: 508px; background: rgb(0, 0, 0); border-radius: 4px; overflow: hidden; margin-bottom: 12px;"><video src="./assets/17742309634720.873416382878314.mp4" poster="./assets/17742309541800.031258447570525205.jpg" controls="" style="width: 100%;height: 100%;"></video></div></section><p><span style="font-size: 15px;"></span></p><p style="display: none;"><mp-style-type data-value="3"></mp-style-type></p></div>
