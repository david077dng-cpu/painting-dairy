            " id="js_content"><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">这周末北京连续雾霾了两天，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">气温也是坐过山车一样回到了冬天。</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">还好上周日去了趟卧佛寺</span><img data-src="https://res.wx.qq.com/t/wx_fed/we-emoji/res/assets/Expression/Expression_14@2x.png" class="rich_pages wxw-img" data-ratio="1" data-w="20" style="display:inline-block;width:20px;vertical-align:middle;background-size:cover;" src="./assets/17742310406660.06286409246083202.png"></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">在这个阴沉的周末跟大家一起回味一下上周的腊梅～</span></span></section><section style="text-align: center;margin-left: 8px;margin-right: 8px;" nodeleaf=""><img class="rich_pages wxw-img js_insertlocalimg" data-imgfileid="100004006" data-ratio="0.9398148148148148" data-s="300,640" data-src="https://mmbiz.qpic.cn/sz_mmbiz_jpg/9FicrUzQHkjQJsoePDY5SmM4aDx0uB7HyvHNW73wXzutz6mficLsYFbMX9VSu6vuHIWZvl5H1Rml8ypBPeFT0NBw/640?wx_fmt=jpeg&amp;from=appmsg" data-type="jpeg" data-w="1080" type="block" src="./assets/17742310408780.1669460756776412.jpg"></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">卧佛寺的腊梅比颐和园多了很多，满院花开，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">而且寺庙的红墙黑瓦、屋檐风铃也丰富了构图。</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">今天换了一种画纸也换一种风格，</span></span></section><section style="margin-left: 8px;margin-right: 8px;"><span leaf=""><span textstyle="" style="font-size: 15px;">不知道大家更喜欢上期的画风还是这期的画风呢～<
