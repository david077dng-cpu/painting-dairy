                       " id="js_content"><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">今天画的水彩来自订阅朋友滴投稿～<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">好久没有投稿啦，感谢投稿～</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><br></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">画的主角是她家的两位大美女，<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">左边是妹妹，叫碰瓷，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">有点调皮捣蛋。<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">右边姐姐叫花花，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">很温顺、胆小。<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">庆祝她们相识周年快乐～</span></p><p style="text-align: center;margin: 0.5em 8px 0em;"><img class="rich_pages wxw-img js_insertlocalimg" data-ratio="0.6734375" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjRGAvLN9KIpsBlc6lYupWIqjdb89jN9L5qpfu7lf7UI8CeQEG0eOwwENojZUsSNb24Ru40bFX4hxQ/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742293003180.389890298424706.jpg"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><br></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">小编在画的时候就能感觉到这两只性格的差异，<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">还挺神奇的</span><img class="rich_pages wxw-img" data-ratio="1" data-src="https://mmbiz.qpic.cn/mmbiz_png/9FicrUzQHkjRGAvLN9KIpsBlc6lYupWIqKYxx7VbTKYIUtpZhqeKbg67JxZl5icESgNWoZTib2SB3u8FAmWkM4rCw/640?wx_fmt=png" data-type="png" data-w="20" style="display:inline-block;width:20px;vertical-align:text-bottom;" src="./assets/17742292998420.8597313402898149.png"></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">不知道你们能不能一样感觉到～<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">好啦，这周先到这边，<br></span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">欢迎留言、转发or给个"在看"～</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 0.5em;"><span style="font-size: 15px;">期待更多的投稿呀～</span></p><p style="text-align: center;margin: 0.5em 8px 0em;"><img class="rich_pages wxw-img" data-galleryid="" data-ratio="0.12083333333333333" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQ1U6fBpWKudpYHTw2VQ8Fh3wibSCLBicicfibxZjSgcjJWoKEXLTozNpiaOuRm15MU0KrI9oHYiaEiaVlKw/640?wx_fmt=gif" data-type="gif" data-w="720" style="" src="./assets/17742292996900.5303913948441396.gif"></p></div>
