                       " id="js_content"><p><span style="font-size: 15px;">拥有一位外婆就像拥有一整支军队。</span></p><p><span style="font-size: 15px;">外孙或外孙女因此获得一项特权：</span></p><p><span style="font-size: 15px;">不管在什么情况下，</span></p><p><span style="font-size: 15px;">都有人站在你这边，</span></p><p><span style="font-size: 15px;">即使是你的错。</span></p><p><span style="font-size: 15px;">事实上，特别是你错的时候。<br></span></p><p><br></p><p><span style="font-size: 15px;">——《外婆的道歉信》</span></p><p><br></p><p style="text-align: center;"><img class="" data-copyright="0" data-ratio="0.678125" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQuqgc6p9F1WN72UXTwdf1odupoqD7TCeqTlRDAYA0VcvgqUfqibxl6qjiaRjEAYMVNckhib49SPQpVQ/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742292993080.5460899461927617.jpg"></p><p style="text-align: center;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTcRDNuSrficiajicWibLWFMT1eiciarUOEb2CbvG9Zxf4tQXFSNoLAJhXFyT1kt0Il8TF4x4CapiaOgRKJQ/0?wx_fmt=jpeg" data-cropx1="54.80575539568346" data-cropx2="528.0323741007195" data-cropy1="675.5863309352519" data-cropy2="707.2050359712231" data-ratio="0.06751054852320675" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQuqgc6p9F1WN72UXTwdf1oibxUTHmiaPvvamFLkfpOtgWicEo1ywSMbVA1RAoC1313jH2g69zdweicwA/640?wx_fmt=jpeg" data-type="jpeg" data-w="474" style="width: 449px;height: 30px;" src="./assets/17742292991300.6679693071732574.jpg"></p><p style="text-align: center;"><span style="font-size: 15px;">今天的照片来自投稿，</span></p><p style="text-align: center;"><span style="font-size: 15px;">感谢<span style="font-size: 15px;color: rgb(121, 123, 170);">“昆图库，塔卡提，考特苏，瓦西拉松”</span>同学～</span></p><p style="text-align: center;"><span style="font-size: 15px;">欢迎大家发照片给我～</span></p><p style="text-align: center;"><span style="font-size: 15px;"><span style="font-size: 15px;">我来把它们变成水彩哦～</span></span></p><p style="text-align: center;"><span style="font-size: 15px;"><span style="font-size: 15px
