                       " id="js_content"><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">今天的投稿来自公众号一位铁杆粉丝～</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">感谢投稿！！</span></p><p style="margin-top: 10px;text-align: center;"><img class="" data-before-oversubscription-url="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQicTsKAy7lRggULzQ6DxR9Uzygf9TibMoWngQK19Z9D5pHdjJ3QfC3bWu8ltMMwTt6Xhm9IupsXusA/0?wx_fmt=gif" data-copyright="0" data-ratio="0.3" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQicTsKAy7lRggULzQ6DxR9Uzygf9TibMoWngQK19Z9D5pHdjJ3QfC3bWu8ltMMwTt6Xhm9IupsXusA/640?wx_fmt=gif" data-type="gif" data-w="400" style="width: 231px;height: 69px;" src="./assets/17742292730530.21162364080774232.gif"></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">大风车吱呀吱呦呦地转，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">这里的风景呀真好看，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">天好看，地好看，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">还有一起快乐的小伙伴。</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">大风车转啊转悠悠，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">快乐的伙伴手牵手，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">牵你的手，牵我的手，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">今天的小伙伴，</span></p><p style="margin-top: 10px;text-align: justify;"><span style="font-size: 15px;">明天的好朋友。</span></p><p style="margin-top: 10px;"><img class="" data-copyright="0" data-ratio="1.4328125" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTItAN9hYU8L9HloFXaiaEP8WDLsqEnZokDbzE4ZiaIPuHeHQUWZnBW9O6EmI3gtYdMFwzbNwTAJUCw/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742292733610.3789304258058901.jpg"></p><p style="text-align: center;margin-top: 10px;"><img class="" data-before-oversubscription-url="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQicTsKAy7lRggULzQ6DxR9Uzygf9TibMoWngQK19Z9D5pHdjJ3QfC3bWu8ltMMwTt6Xhm9IupsXusA/0?wx_fmt=gif" data-copyright="0" data-ratio="0.3" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQicTsKAy7lRggULzQ6DxR9Uzygf9TibMoWngQK19Z9D5pHdjJ3QfC3bWu8ltMMwTt6Xhm9IupsXusA/640?wx_fmt=gif" data-type="gif" data-w="400" style="width: 231px;height: 69px;" src="./assets/17742292730690.7550936277631206.gif"></p><p style="text-align: center;margin-top: 10px;"><span style="font-size: 15px;">之前画过一个小婴儿～</span></p><p style="text-align: center;margin-top: 10px;"><span style="font-size: 15px;">就是这个宝宝，</span></p><p style="text-align: center;margin-top: 10px;"><span style="font-size: 15px;">现在依旧这么爱笑，这么可爱～</span></p><p style="text-align: center;margin-top: 10px;"><span style="font-size: 15px;">希望他可以永远开心～<br></span></p><p style="text-align: center;margin-top: 10px;"><span style="font-size: 15px;">欢迎点赞、留言and转发发发~</span></p><p style="text-align: center;margin-top: 10px;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTiaLfGMgDLVadWLn5aolj39edVfRO6BicH3nkFSVoia0USh5ZqI6GvqX1GzBsMbXFpwQKpe1FxXsaAg/0?wx_fmt=jpeg" data-cropx1="151.25065274151436" data-cropx2="1021.6553524804178" data-cropy1="79.90600522193212" data-cropy2="910.3577023498696" data-ratio="0.9540229885057471" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQQnPpJQLqTFDO5nmTGDYKsibk4nhuIshhjr7icPKzhoUJjQicY9ia9ALKMPoHwJbogJ7GkFrtGPGNw0Q/640?wx_fmt=jpeg" data-type="jpeg" data-w="870" style="width: 206px;height: 197px;" src="./assets/17742292733460.04577951757886367.jpg"></p><p style="text-align: center;"><br></p><p><img class="" data-copyright="0" data-ratio="0.12083333333333333" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQ1U6fBpWKudpYHTw2VQ8Fh3wibSCLBicicfibxZjSgcjJWoKEXLTozNpiaOuRm15MU0KrI9oHYiaEiaVlKw/640?wx_fmt=gif" data-type="gif" data-w="720" style="" src="./assets/17742292730920.6547260661563733.gif"></p></div>
