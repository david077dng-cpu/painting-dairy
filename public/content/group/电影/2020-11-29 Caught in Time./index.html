                       " id="js_content"><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">今天去电影院看了《除暴》，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">很久没看警匪片了，还是挺有那味儿的。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">没想到在我还是个宝宝的时候，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">我国的枪支管理法还没有出台，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">悍匪曾经这么嚣张过。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">看完不自觉感叹现在的和平生活真是可贵。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">电影情节确实挺简单的，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">一个半小时有点意犹未尽，</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">但两位主演都很出彩，很喜欢。</span></p><p style="margin-left: 8px;margin-right: 8px;margin-top: 10px;"><span style="font-size: 15px;">就是被我画的有点……</span></p><p style="text-align: center;margin-top: 10px;margin-left: 8px;margin-right: 8px;"><img class="rich_pages js_insertlocalimg" data-ratio="0.62109375" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjRwJHlNfTcicadVcMf8pJofY0mT8qq76VHsxXxSRp9umGjjOAO9HNuvsrn3rYxO1EEGAbAdNIYz9lg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742301598850.13389172602252974.jpg"></p><p style="margin-top: 10px;margin-left: 8px;margin-right: 8px;"><span style="font-size: 15px;">帅哥不好画，有压力🙈，<br></span></p><p style="margin-top: 10px;margin-left: 8px;margin-right: 8px;"><span style="font-size: 15px;">给两位主演道歉🤣🤣🤣。</span></p><p style="margin-top: 10px;margin-left: 8px;margin-right: 8px;"><span style="font-size: 15px;">好啦，今天就到这，</span></p><
