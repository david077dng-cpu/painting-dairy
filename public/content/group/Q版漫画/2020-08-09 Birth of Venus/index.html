                       " id="js_content"><p>最近超爱这个画风，</p><section style="margin-top: 10px;">今天带来的是“小戏骨版”《维纳斯的诞生》🤪。</section><section style="margin-top: 10px;">这幅画也算是美术书上的老朋友了，</section><section style="margin-top: 10px;">波提切利的维纳斯一直是我心中维纳斯的样子，</section><section style="margin-top: 10px;">诞生于大海中，轻轻踩在贝壳上，</section><section style="margin-top: 10px;">风神把她吹到岸边，</section><section style="margin-top: 10px;">春之神送来美丽的裙子，</section><p style="margin-top: 10px;">“女神就是女神哇<img data-ratio="1" data-src="https://mmbiz.qpic.cn/mmbiz_png/9FicrUzQHkjQkEY9iao5vatMyDoSZYakicUy4aichOczO9YpBY7Vs9W2kCl99OrZgaZKOLZVTn8xicxM4g5DBCoJnFQ/640?wx_fmt=png" data-type="png" data-w="20" style="display:inline-block;width:20px;vertical-align:text-bottom;" src="./assets/17742307154430.19834444559960474.png">～</p><section style="margin-top: 10px;">出场都这么不一样”<br></section><section style="text-align: center;margin-top: 10px;"><img class="rich_pages js_insertlocalimg" data-ratio="0.6984375" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQkEY9iao5vatMyDoSZYakicU4owQbtBicricAx215DRM1hZUiaErNejibX8XRChoVFOe1xlZ6OxACe2uFg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742307157250.9772596085390212.jpg"></section><p>放个原画在这里吧，</p><p style="text-align: center;"><img class="rich_pages js_insertlocalimg" data-ratio="0.5618181818181818" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQkEY9iao5vatMyDoSZYakicUU2TicapkUkeFibSBqbg1YjaibskAT803YB0VhyUU9qKBkJherfEwNiaXuQ/640?wx_fmt=jpeg" data-type="jpeg" data-w="550" style="" src="./assets/17742307155410.05412670821128929.jpg"></p><section style="margin-top: 10px;">好啦祝大家下周学习工作顺利，</section><section style="margin-top: 10px;">有个美好的周一～</section><section style="margin-top: 10px;">下周见。欢迎转发、评论or给个“在看”哦～</section><section style="margin-top: 10px;">喜欢的可以看加速视频～</section><p><div style="height: 508px; background: rgb(0, 0, 0); border-radius: 4px; overflow: hidden; margin-bottom: 12px;"><video src="./assets/17742307152300
