                       " id="js_content"><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">先祝今天过节的男同胞们节日快乐～</p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">辛苦了这么久，<br></p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">今天一定要好好休息呀～</p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">祝你们身体健康，心想事成～</p><p style="text-align: center;margin: 8px 8px 0em;"><img class="rich_pages wxw-img js_insertlocalimg" data-ratio="0.6984375" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTnWbuncVYHxUu7pF9AKVCWfxUWRsNQdF5IfdM1RpO3Ws7kRfdmS8c4Z60Kt1oCRyJuwhPS4bLib3Q/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742306422970.7275531732016508.jpg"></p><section style="margin-left: 8px;margin-right: 8px;margin-top: 8px;">今天画一张前段时间拍的全家福，</section><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">在一个晴空万里的日子里，</p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">在一棵盛开的玉兰花树下拍摄的美好瞬间📷<br></p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">爸爸说过，我和麻麻都好好的，他就开心～</p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">我和麻麻也希望你可以把自己吃的胖一点～</p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">就和我画的一样～<img data-ratio="1" data-src="https://mmbiz.qpic.cn/mmbiz_png/9FicrUzQHkjTnWbuncVYHxUu7pF9AKVCWQ8kYKzVzShl0kNbqM9BoFfIict6TeMvnQnvP4hz0EpSev2RaVUztv4w/640?wx_fmt=png" data-type="png" data-w="20" style="display:inline-block;width:20px;vertical-align:text-bottom;" src="./assets/17742306417200.561327624033386.png"></p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;text-align: center;"><img class="rich_pages wxw-img" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTcRDNuSrficiajicWibLWFMT1eFhgo9PCX3tANYibDxfFNIwnsQMnO3BwFxUiaGm1TTSmQicl46oODd94vQ/0?wx_fmt=jpeg" data-cropx1="0" data-cropx2="694" data-cropy1="402.266318537859" data-cropy2="496.49086161879893" data-ratio="0.13544668587896252" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQQnPpJQLqTFDO5nmTGDYKs1ChdMFannZROYPHRmZWzdWaROKrwia9He7pZhFrbTKXBBsC3Yhnibmhw/640?wx_fmt=jpeg" data-type="jpeg" data-w="694" style="margin: 0px;padding: 0px;max-width: 100%;height: 39px;vertical-align: bottom;caret-color: rgb(51, 51, 51);color: rgb(51, 51, 51);font-family: mp-quote, -apple-system-font, BlinkMacSystemFont, &quot;Helvetica Neue&quot;, &quot;PingFang SC&quot;, &quot;Hiragino Sans GB&quot;, &quot;Microsoft YaHei UI&quot;, &quot;Microsoft YaHei&quot;, Arial, sans-serif;font-size: 17px;font-style: normal;font-variant-caps: normal;font-weight: 400;letter-spacing: normal;orphans: auto;text-align: center;text-indent: 0px;text-transform: none;white-space: normal;widows: auto;word-spacing: 0px;-webkit-text-size-adjust: none;-webkit-text-stroke-width: 0px;text-decoration: none;width: 290px;" src="./assets/17742306415360.6681541699591699.jpg"></p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">好啦今天就到这里～<br></p><p style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">加速小视频在下面，欢迎点击观看～<br></p><p style="margin-left: 8px;margin-right: 8px;"><div style="height: 508px; background: rgb(0, 0, 0); border-radius: 4px; overflow: hidden; margin-bottom: 12px;"><video src="./assets/17742306413900.24882077151575144.mp4" poster="./assets/17742306316990.9957638467843942.jpg" controls="" style="width: 100%;height: 100%;"></video></div></p><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">下回见～欢迎留言、转发or给个"在看"～</section><section style="margin-top: 8px;margin-left: 8px;margin-right: 8px;">更欢迎投稿呦～<br></section><p style="margin: 8px 8px 0em;"><img class="rich_pages wxw-img" data-copyright="0" data-ratio="0.12083333333333333" data-src="https://mmbiz.qpic.cn/mmbiz_gif/9FicrUzQHkjQ1U6fBpWKudpYHTw2VQ8Fh3wibSCLBicicfibxZjSgcjJWoKEXLTozNpiaOuRm15MU0KrI9oHYiaEiaVlKw/640?wx_fmt=gif" data-type="gif" data-w="720" style="" src="./assets/17742306415450.2557251256838019.gif"></p></div>
