                       " id="js_content"><p style="margin-top: 10px;">今天正月初六，</p><p style="margin-top: 10px;">天朗气清，</p><p style="margin-top: 10px;">惠风和畅。<br></p><p style="margin-top: 10px;">正是遛百病的好天气。</p><p style="margin-top: 10px;">今天的主角是天津金汤桥，</p><p style="margin-top: 10px;">确切的说，</p><p style="margin-top: 10px;">是桥头的一座雕像。</p><p style="margin-top: 10px;">1948年解放军发动平津战役之后，</p><p style="margin-top: 10px;">在49年1月15日凌晨，</p><p style="margin-top: 10px;">东西两路主攻部队于金汤桥胜利会师，</p><p style="margin-top: 10px;">天津宣告解放。</p><p style="margin-top: 10px;"><br></p><p><img class="" data-copyright="0" data-ratio="1.409375" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjRbiamCrlasP2iaZchIe9lukACCKib9qqhOV07RSz8c6pUp8SjXTvAGoxOhW4wUba7gExFkqNOUmtKhA/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327638940.3702333209401375.jpg"></p><p style="text-align: center;margin-top: 10px;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTcRDNuSrficiajicWibLWFMT1eFhgo9PCX3tANYibDxfFNIwnsQMnO3BwFxUiaGm1TTSmQicl46oODd94vQ/0?wx_fmt=jpeg" data-cropx1="0" data-cropx2="694" data-cropy1="758.673835125448" data-cropy2="858.1720430107528" data-ratio="0.1440922190201729" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjRbiamCrlasP2iaZchIe9lukAZiawbianMGGWKfQdA2a7YXMtVcSRIWdnXIsROEQx7SQhUQZCIH7ibUyZg/640?wx_fmt=jpeg" data-type="jpeg" data-w="694" style="width: 388px;height: 56px;" src="./assets/17742327637630.43742107947296416.jpg"></p><p style="margin-top: 10px;">有没有感受到解放的喜悦气氛~</p><p style="margin-top: 10px;">要上班了，同志们加油<img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/emoji_ios/u1F4AA.0.png" data-ratio="1" data-w="20" style="display: inline-block;width: 20px;vertical-align: text-bottom;" src="./assets/17742327637910.013986512005439655.png"></p><p style="margin-top: 10px;">好啦，欢迎评论、点赞and转发~</p><p style="margin-top: 10px;">祝大家晚安~<img data-src="https://res.wx.qq.com/mpres/htmledition/images/icon/common/emotion_panel/smiley/smiley_75.png" data-ratio="1" data-w="20" style="display: inline-block;width: 20px;vertical-align: text-bottom;" src="./assets/17742327640770.6866627869204472.png"></p><p style="text-align: center;"><img class="" data-copyright="0" data-ratio="1" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_png/9FicrUzQHkjTiaLfGMgDLVadWLn5aolj39SibTpWPD7VVWRGW9icOjDwDUK71NzYZmVyGhoia4MTpics8BGiauXTUJvqg/640?wx_fmt=png" data-type="png" data-w="480" style="width: 237px;height: 237px;" src="./assets/17742327635860.1942960823513884.jpg"></p><p>点击“阅读原文”，照片变水彩~</p></div>
