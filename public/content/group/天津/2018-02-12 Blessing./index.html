                       " id="js_content"><p style="margin-top: 10px;">今天地震了，</p><p style="margin-top: 10px;">坐在家里，</p><p style="margin-top: 10px;">感觉跟坐在船上似的，</p><p style="margin-top: 10px;">晃悠了一下，</p><p style="margin-top: 10px;">第一次体会到地震，</p><p style="margin-top: 10px;">看着家里的小灯笼晃来晃去的，</p><p style="margin-top: 10px;">还挺害怕的，</p><p style="margin-top: 10px;">人在灾难面前实在是太渺小了。</p><p style="margin-top: 10px;"><br></p><p><img class="" data-copyright="0" data-ratio="0.709375" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQYMPPv3iakFVElXkiaN1Cd0mxXWHTKerU9AG4GkJwib62oraKJvEWmoNXRE4KhqxUnFr4OqNg5o3REg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1280" style="" src="./assets/17742327661560.08826387362977584.jpg"></p><p style="margin-top: 10px;">今天画天津的天后宫，</p><p style="margin-top: 10px;">希望妈祖保佑，</p><p style="margin-top: 10px;">家乡不再有灾难。</p><p style="text-align: center;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjSGdxpMkXrePeddWUXxnicW4ic34IEojShN5vqj3lydH92rjtNpyTnoRrgLNEs519lx3Dl40EJOwrag/0?wx_fmt=jpeg" data-cropx1="0" data-cropx2="1084" data-cropy1="0" data-cropy2="112.67383512544804" data-ratio="0.1033210332103321" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQYMPPv3iakFVElXkiaN1Cd0mCdS5Sddhuib7gMXNGHofCGsraCdt9HiccKqgUabL8ub0uckOiczpp7ILg/640?wx_fmt=jpeg" data-type="jpeg" data-w="1084" style="width: 329px;height: 34px;" src="./assets/17742327661150.7630419044061706.jpg"></p><p style="text-align: left;margin-top: 10px;">今天大扫除翻到了之前留下的门票，</p><p style="text-align: left;margin-top: 10px;">照着门票画了这幅。</p><p style="text-align: left;margin-top: 10px;">好啦，欢迎评评论、转转发and点点赞 ~</p><p style="text-align: left;margin-top: 10px;">晚安 ~<br></p><p style="text-align: center;"><img class="" data-croporisrc="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjTiaLfGMgDLVadWLn5aolj39edVfRO6BicH3nkFSVoia0USh5ZqI6GvqX1GzBsMbXFpwQKpe1FxXsaAg/0?wx_fmt=jpeg" data-cropx1="168.4551971326165" data-cropx2="987.2258064516129" data-cropy1="84.22759856630823" data-cropy2="899.0806451612901" data-ratio="0.9951159951159951" data-s="300,640" data-src="https://mmbiz.qpic.cn/mmbiz_jpg/9FicrUzQHkjQYMPPv3iakFVElXkiaN1Cd0mOAOiacGQf2XYl0kN3nucWmMib29EnfFKiaU6Xd0M01QGEX3umibp6DO5Vw/640?wx_fmt=jpeg" data-type="jpeg" data-w="819" style="width: 217px;height: 216px;" src="./assets/17742327662170.7066139435229168.jpg"></p><p>点击“阅读原文”，照片变水彩~<br></p></div>
